name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            arch: arm64
            goarch: arm64
          - os: macos-latest
            arch: amd64
            goarch: amd64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          CGO_ENABLED: 1
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -o claude-usage-bar-darwin-${{ matrix.arch }} .
          tar -czf claude-usage-bar-darwin-${{ matrix.arch }}.tar.gz claude-usage-bar-darwin-${{ matrix.arch }}

      - uses: actions/upload-artifact@v4
        with:
          name: claude-usage-bar-darwin-${{ matrix.arch }}
          path: claude-usage-bar-darwin-${{ matrix.arch }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            claude-usage-bar-darwin-arm64/claude-usage-bar-darwin-arm64.tar.gz
            claude-usage-bar-darwin-amd64/claude-usage-bar-darwin-amd64.tar.gz

      - name: Update Homebrew formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$HOMEBREW_TAP_TOKEN" ]; then
            echo "HOMEBREW_TAP_TOKEN not set, skipping formula update"
            exit 0
          fi

          VERSION=${GITHUB_REF_NAME#v}
          SHA256_ARM64=$(sha256sum claude-usage-bar-darwin-arm64/claude-usage-bar-darwin-arm64.tar.gz | awk '{print $1}')
          SHA256_AMD64=$(sha256sum claude-usage-bar-darwin-amd64/claude-usage-bar-darwin-amd64.tar.gz | awk '{print $1}')

          git clone https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/hwayoungjun/homebrew-tap.git
          cp .github/scripts/update_formula.py homebrew-tap/
          cd homebrew-tap

          python3 update_formula.py "$VERSION" "$SHA256_ARM64" "$SHA256_AMD64"
          rm update_formula.py

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add Formula/claude-usage-bar.rb
          git commit -m "Update claude-usage-bar to v${VERSION}"
          git push
