name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            arch: arm64
            goarch: arm64
          - os: macos-13
            arch: amd64
            goarch: amd64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          CGO_ENABLED: 1
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -o claude-usage-bar-darwin-${{ matrix.arch }} .
          tar -czf claude-usage-bar-darwin-${{ matrix.arch }}.tar.gz claude-usage-bar-darwin-${{ matrix.arch }}

      - uses: actions/upload-artifact@v4
        with:
          name: claude-usage-bar-darwin-${{ matrix.arch }}
          path: claude-usage-bar-darwin-${{ matrix.arch }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            claude-usage-bar-darwin-arm64/claude-usage-bar-darwin-arm64.tar.gz
            claude-usage-bar-darwin-amd64/claude-usage-bar-darwin-amd64.tar.gz
